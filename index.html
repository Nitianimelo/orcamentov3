<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F5F3EE">
    <meta name="description" content="Sistema profissional para criação de orçamentos e recibos">
    <title>Orçamentos e Recibos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <div class="dashboard-wrapper">
        <!-- Topo -->
        <header class="dashboard-header">
            <div class="dashboard-brand">
                <span class="dashboard-logo-text" id="dashboardCompanyName">Minha Empresa</span>
            </div>
            <p class="dashboard-greeting">O que vamos fazer hoje?</p>
        </header>

        <!-- Conteúdo rolável -->
        <main class="dashboard-main" id="dashboardMain">
            <!-- Resumo rápido -->
            <section class="dashboard-section" id="recentSection" style="display:none;">
                <div class="section-header">
                    <h2>Recentes</h2>
                    <a href="historico.html" class="section-link">Ver todos</a>
                </div>
                <div class="recent-scroll" id="recentScroll">
                    <!-- Cards injetados via JS -->
                </div>
            </section>

            <!-- Ações principais (fallback se não houver recentes, ou complemento) -->
            <section class="dashboard-section">
                <div class="section-header">
                    <h2>Ações Rápidas</h2>
                </div>
                <div class="action-grid">
                    <a href="orcamento.html" class="action-card action-card--primary">
                        <div class="action-icon action-icon--budget">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                        </div>
                        <span class="action-label">Novo Orçamento</span>
                        <span class="action-hint">Crie e envie em segundos</span>
                    </a>
                    <a href="recibo.html" class="action-card action-card--primary">
                        <div class="action-icon action-icon--receipt">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                            </svg>
                        </div>
                        <span class="action-label">Novo Recibo</span>
                        <span class="action-hint">Confirme o pagamento</span>
                    </a>
                </div>
            </section>


        </main>

        <!-- Dock inferior fixo -->
        <nav class="dashboard-dock">
            <a href="historico.html" class="dock-item">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>Histórico</span>
            </a>
            <a href="admin.html" class="dock-item">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span>Ajustes</span>
            </a>
            <a href="orcamento.html" class="dock-item dock-item--hero dock-item--budget">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                <span>Orçamento</span>
            </a>
            <a href="recibo.html" class="dock-item dock-item--hero dock-item--receipt">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>Recibo</span>
            </a>
        </nav>
    </div>

    <script src="ux.js"></script>
    <script>
        // Carrega nome da empresa
        (function() {
            const data = localStorage.getItem('companyData');
            const company = data ? JSON.parse(data) : {};
            const nameEl = document.getElementById('dashboardCompanyName');
            if (nameEl && company.companyName) {
                nameEl.textContent = company.companyName;
            }

            // Carrega documentos recentes (últimos 5)
            const docsData = localStorage.getItem('documents');
            const docs = docsData ? JSON.parse(docsData) : [];
            const recent = docs.slice(0, 5);

            const recentSection = document.getElementById('recentSection');
            const recentScroll = document.getElementById('recentScroll');
            const emptyTip = document.getElementById('emptyTip');

            if (recent.length > 0 && recentSection && recentScroll) {
                recentSection.style.display = '';
                recentScroll.innerHTML = recent.map(doc => {
                    const isB = doc.type === 'budget';
                    const label = isB ? 'Orçamento' : 'Recibo';
                    const number = isB ? doc.budgetNumber : doc.receiptNumber;
                    const person = isB ? doc.clientName : doc.payerName;
                    const amount = isB ? doc.total : doc.amountReceived;
                    const amtText = (amount || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    return `
                        <a href="historico.html" class="recent-card">
                            <span class="recent-badge ${isB ? 'recent-badge--budget' : 'recent-badge--receipt'}">${label}</span>
                            <span class="recent-person">${person || 'Sem nome'}</span>
                            <span class="recent-number">Nº ${number || '--'}</span>
                            <span class="recent-amount">${amtText}</span>
                        </a>
                    `;
                }).join('');
            } else {
                if (emptyTip) emptyTip.style.display = '';
            }
        })();
    </script>
</body>
</html>
