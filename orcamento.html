<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Criar novo orçamento profissional">
    <title>Novo Orçamento</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
    <div class="container">
        <header class="header">
            <a href="index.html" class="back-button">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Voltar
            </a>
            <h1>Novo Orçamento</h1>
        </header>

        <main class="document-form">
            <form id="budgetForm">
                <div class="form-section">
                    <h2>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        Dados do Cliente
                    </h2>

                    <div class="form-group">
                        <label for="clientName">Nome do Cliente *</label>
                        <input type="text" id="clientName" required placeholder="Nome completo ou Razão Social">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="clientPhone">Telefone</label>
                            <input type="tel" id="clientPhone" placeholder="(00) 00000-0000">
                        </div>

                        <div class="form-group">
                            <label for="clientEmail">E-mail</label>
                            <input type="email" id="clientEmail" placeholder="cliente@email.com">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="clientAddress">Endereço Completo</label>
                        <textarea id="clientAddress" rows="2"
                            placeholder="Rua, número, bairro, cidade - Estado"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="clientCPFCNPJ">CPF/CNPJ</label>
                            <input type="text" id="clientCPFCNPJ" placeholder="000.000.000-00">
                        </div>

                        <div class="form-group">
                            <label for="budgetDate">Data do Orçamento *</label>
                            <input type="date" id="budgetDate" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="budgetNumber">Número do Orçamento</label>
                            <input type="text" id="budgetNumber" placeholder="Ex: 2025001">
                        </div>

                        <div class="form-group">
                            <label for="validUntil">Validade</label>
                            <input type="date" id="validUntil">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                        Itens do Orçamento
                    </h2>

                    <div id="itemsContainer">
                        <!-- Items will be added here dynamically -->
                    </div>

                    <button type="button" class="btn btn-add" id="addItemBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                        </svg>
                        Adicionar Item
                    </button>
                </div>

                <div class="form-section">
                    <h2>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Detalhes Adicionais
                    </h2>

                    <div class="form-group">
                        <label for="warranty">Garantia</label>
                        <input type="text" id="warranty" placeholder="Ex: 90 dias para serviços">
                    </div>

                    <div class="form-group">
                        <label for="paymentConditions">Condições de Pagamento</label>
                        <textarea id="paymentConditions" rows="2"
                            placeholder="Ex: 50% entrada + 50% na conclusão"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="observations">Observações</label>
                        <textarea id="observations" rows="4" placeholder="Informações adicionais relevantes"></textarea>
                    </div>
                </div>

                <div class="form-section total-section">
                    <div class="total-display">
                        <div class="total-row">
                            <span>Subtotal:</span>
                            <span id="subtotalDisplay">R$ 0,00</span>
                        </div>
                        <div class="total-row">
                            <label for="discount">Desconto (%):</label>
                            <input type="number" id="discount" min="0" max="100" step="0.01" value="0"
                                class="discount-input">
                        </div>
                        <div class="total-row discount-amount">
                            <span>Desconto:</span>
                            <span id="discountDisplay">R$ 0,00</span>
                        </div>
                        <div class="total-row final-total">
                            <span>TOTAL:</span>
                            <span id="totalDisplay">R$ 0,00</span>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        Gerar PDF
                    </button>
                    <button type="button" class="btn btn-whatsapp" id="whatsappBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20"
                            height="20">
                            <path
                                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
                        </svg>
                        Enviar via WhatsApp
                    </button>
                    <button type="button" class="btn btn-secondary" id="clearBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                        Limpar
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="orcamento.js"></script>
</body>

</html>
